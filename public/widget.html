<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      min-height: 44px;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .dot.present {
      background: #16a34a;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(22, 163, 74, 0); }
    }
    .label {
      font-size: 13.5px;
      color: #6b7280;
      flex: 1;
      white-space: nowrap;
    }
    .label.present { color: #15803d; font-weight: 600; }
    .schedule-link {
      font-size: 12.5px;
      color: #9ca3af;
      text-decoration: none;
      white-space: nowrap;
    }
    .schedule-link:hover { color: #4b5563; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="dot" id="dot"></div>
  <span class="label" id="label">Checking...</span>
  <a class="schedule-link" href="/schedule" target="_blank" rel="noopener">View schedule →</a>

  <script>
    const dot = document.getElementById('dot');
    const label = document.getElementById('label');

    function update(state) {
      if (state.present) {
        dot.className = 'dot present';
        label.textContent = 'Currently present';
        label.className = 'label present';
      } else {
        dot.className = 'dot';
        label.textContent = 'Not currently present';
        label.className = 'label';
      }
    }

    const es = new EventSource('/events');
    es.onmessage = e => update(JSON.parse(e.data));
    es.onerror = () => fetch('/api/state').then(r => r.json()).then(update).catch(() => {
      label.textContent = 'Status unavailable';
    });
  </script>
</body>
</html>
