<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .dot.present {
      background: #16a34a;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(22, 163, 74, 0); }
    }
    .label {
      font-size: 13.5px;
      color: #6b7280;
      flex: 1;
      white-space: nowrap;
    }
    .label.present { color: #15803d; font-weight: 600; }
    .join-btn {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: #16a34a;
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .join-btn:hover { background: #15803d; }
    .schedule-link {
      font-size: 12.5px;
      color: #9ca3af;
      text-decoration: none;
      white-space: nowrap;
    }
    .schedule-link:hover { color: #4b5563; text-decoration: underline; }
    .next-event {
      font-size: 12px;
      color: #9ca3af;
      padding-left: 21px;
      display: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .next-event.visible { display: block; }
    .next-event.live { color: #15803d; font-weight: 600; }
    .next-event a { color: inherit; text-decoration: none; }
    .next-event a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="row">
    <div class="dot" id="dot"></div>
    <span class="label" id="label">Checking...</span>
    <a class="join-btn" id="join-btn" href="#" target="_blank" rel="noopener" style="display:none">Join</a>
    <a class="schedule-link" href="/schedule" target="_blank" rel="noopener">View schedule →</a>
  </div>
  <div class="next-event" id="next-event"></div>

  <script>
    const dot = document.getElementById('dot');
    const label = document.getElementById('label');
    const joinBtn = document.getElementById('join-btn');
    const nextEvent = document.getElementById('next-event');

    let relevantLink = null;

    function update(state) {
      if (state.present) {
        dot.className = 'dot present';
        label.textContent = 'Currently present';
        label.className = 'label present';
        if (relevantLink) {
          joinBtn.href = relevantLink;
          joinBtn.style.display = '';
        } else {
          joinBtn.style.display = 'none';
        }
      } else {
        dot.className = 'dot';
        label.textContent = 'Not currently present';
        label.className = 'label';
        joinBtn.style.display = 'none';
      }
    }

    function formatNext(entry) {
      const now = new Date();
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      const entryDate = new Date(entry.date + 'T00:00:00');

      let dateLabel;
      if (entryDate.getTime() === today.getTime()) dateLabel = 'Today';
      else if (entryDate.getTime() === tomorrow.getTime()) dateLabel = 'Tomorrow';
      else dateLabel = entryDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      const [h, m] = entry.time.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const timeLabel = `${h % 12 || 12}:${m.toString().padStart(2, '0')} ${ampm}`;

      return `Next: ${entry.label} · ${dateLabel} at ${timeLabel}`;
    }

    async function loadScheduleInfo() {
      try {
        const [schedule, state] = await Promise.all([
          fetch('/api/schedule').then(r => r.json()),
          fetch('/api/state').then(r => r.json()),
        ]);
        const now = new Date();

        const current = schedule.find(e => {
          const start = new Date(e.date + 'T' + e.time + ':00');
          const end = new Date(start.getTime() + (e.duration || 120) * 60000);
          return now >= start && now < end;
        });

        const upcoming = schedule
          .filter(e => new Date(e.date + 'T' + e.time + ':00') >= now)
          .sort((a, b) => `${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));

        // Pick the most relevant event link: current session first, then next upcoming
        const linkSource = current || upcoming[0];
        relevantLink = linkSource?.link || null;

        // Re-render the label now that we know the link
        update(state);

        if (current) {
          const inner = current.link
            ? `<a href="${current.link}" target="_blank" rel="noopener">🔴 Live now: ${current.label} →</a>`
            : `🔴 Live now: ${current.label}`;
          nextEvent.innerHTML = inner;
          nextEvent.classList.add('visible', 'live');
          return;
        }

        if (upcoming.length) {
          nextEvent.textContent = formatNext(upcoming[0]);
          nextEvent.classList.add('visible');
        }
      } catch {}
    }

    const es = new EventSource('/events');
    es.onmessage = e => update(JSON.parse(e.data));
    es.onerror = () => fetch('/api/state').then(r => r.json()).then(update).catch(() => {
      label.textContent = 'Status unavailable';
    });

    loadScheduleInfo();
  </script>
</body>
</html>
