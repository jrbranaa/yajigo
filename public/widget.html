<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .dot.present {
      background: #16a34a;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(22, 163, 74, 0); }
    }
    .label {
      font-size: 13.5px;
      color: #6b7280;
      flex: 1;
      white-space: nowrap;
    }
    .label.present { color: #15803d; font-weight: 600; }
    .join-btn {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: #16a34a;
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .join-btn:hover { background: #15803d; }
    .schedule-link {
      font-size: 12.5px;
      color: #9ca3af;
      text-decoration: none;
      white-space: nowrap;
    }
    .schedule-link:hover { color: #4b5563; text-decoration: underline; }
    .session-info {
      font-size: 12px;
      color: #9ca3af;
      padding-left: 21px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: none;
    }
    .session-info.visible { display: block; }
    .session-info.live { color: #15803d; font-weight: 600; }
    .powered-by {
      font-size: 10px;
      color: #d1d5db;
      margin-top: 2px;
    }
    .powered-by a { color: inherit; text-decoration: none; }
    .powered-by a:hover { color: #9ca3af; }
    .site-name {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="site-name" id="site-name"></div>
  <div class="row">
    <div class="dot" id="dot"></div>
    <span class="label" id="label">Checking...</span>
    <a class="join-btn" id="join-btn" href="#" target="_blank" rel="noopener" style="display:none">Join</a>
  </div>
  <div class="session-info" id="session-info"></div>
  <div class="row">
    <a class="schedule-link" href="/schedule" target="_blank" rel="noopener">View schedule →</a>
  </div>
  <div class="powered-by">Powered by <a href="https://yajigo.com" target="_blank" rel="noopener">Yajigo</a></div>

  <script>
    const dot = document.getElementById('dot');
    const label = document.getElementById('label');
    const siteNameEl = document.getElementById('site-name');
    const joinBtn = document.getElementById('join-btn');


    fetch('/api/config').then(r => r.json()).then(cfg => {
      siteNameEl.textContent = cfg.siteName;
    }).catch(() => {});

    let currentSession = null;
    const sessionInfo = document.getElementById('session-info');

    function update(state) {
      if (state.present) {
        dot.className = 'dot present';
        label.textContent = 'Currently present';
        label.className = 'label present';
      } else {
        dot.className = 'dot';
        label.textContent = 'Not currently present';
        label.className = 'label';
      }
      if (state.present && currentSession && currentSession.link) {
        joinBtn.href = currentSession.link;
        joinBtn.style.display = '';
      } else {
        joinBtn.style.display = 'none';
      }
    }

    function formatNext(entry) {
      const start = new Date(entry.date + 'T' + entry.time + ':00Z');
      const now = new Date();
      const todayLocal = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const tomorrowLocal = new Date(todayLocal); tomorrowLocal.setDate(todayLocal.getDate() + 1);
      const entryLocalDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());

      let dateLabel;
      if (entryLocalDay.getTime() === todayLocal.getTime()) dateLabel = 'Today';
      else if (entryLocalDay.getTime() === tomorrowLocal.getTime()) dateLabel = 'Tomorrow';
      else dateLabel = start.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      const timeLabel = start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      return `Next: ${entry.label} · ${dateLabel} at ${timeLabel}`;
    }

    async function loadScheduleInfo() {
      try {
        const [schedule, state] = await Promise.all([
          fetch('/api/schedule').then(r => r.json()),
          fetch('/api/state').then(r => r.json()),
        ]);
        const now = new Date();

        currentSession = schedule.find(e => {
          const start = new Date(e.date + 'T' + e.time + ':00Z');
          const end = new Date(start.getTime() + (e.duration || 120) * 60000);
          return now >= start && now < end;
        }) || null;

        if (currentSession) {
          sessionInfo.textContent = `Live now: ${currentSession.label}`;
          sessionInfo.className = 'session-info visible live';
        } else {
          const next = schedule
            .filter(e => new Date(e.date + 'T' + e.time + ':00Z') > now)
            .sort((a, b) => new Date(a.date + 'T' + a.time + ':00Z') - new Date(b.date + 'T' + b.time + ':00Z'))[0];
          if (next) {
            sessionInfo.textContent = formatNext(next);
            sessionInfo.className = 'session-info visible';
          } else {
            sessionInfo.className = 'session-info';
          }
        }

        update(state);
      } catch {}
    }

    const es = new EventSource('/events');
    es.onmessage = e => update(JSON.parse(e.data));
    es.onerror = () => fetch('/api/state').then(r => r.json()).then(update).catch(() => {
      label.textContent = 'Status unavailable';
    });

    loadScheduleInfo();

    new ResizeObserver(() => {
      window.parent.postMessage({ type: 'yajigo-resize', height: document.body.scrollHeight }, '*');
    }).observe(document.body);
  </script>
</body>
</html>
